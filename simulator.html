<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 Simulador de Testes - Modelos LLM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        select, textarea, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Courier New', monospace;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            display: none;
            margin-top: 30px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            position: relative;
        }

        .result-card.winner {
            border-color: #28a745;
            background: #d4edda;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #dee2e6;
        }

        .model-name {
            font-weight: 700;
            font-size: 1.1em;
            color: #333;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-success {
            background: #28a745;
            color: white;
        }

        .badge-warning {
            background: #ffc107;
            color: #333;
        }

        .badge-danger {
            background: #dc3545;
            color: white;
        }

        .badge-info {
            background: #17a2b8;
            color: white;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .metric {
            background: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .metric-label {
            font-size: 0.75em;
            color: #666;
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #333;
        }

        .metric-value.good {
            color: #28a745;
        }

        .metric-value.warning {
            color: #ffc107;
        }

        .metric-value.bad {
            color: #dc3545;
        }

        .response-text {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 0.9em;
            line-height: 1.6;
            color: #333;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: white;
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 0.85em;
        }

        .history-user {
            color: #667eea;
            font-weight: 600;
        }

        .history-assistant {
            color: #28a745;
            font-weight: 600;
        }

        .summary {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }

        .summary h3 {
            color: #856404;
            margin-bottom: 15px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .summary-item {
            background: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .winner-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9em;
            box-shadow: 0 3px 10px rgba(40, 167, 69, 0.3);
        }

        .error {
            background: #f8d7da;
            border: 2px solid #dc3545;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Simulador de Testes - Modelos LLM</h1>
        <p class="subtitle">Teste comparativo: Mistral AI vs OpenRouter</p>

        <div class="controls">
            <div class="control-group">
                <label for="business">Selecione o Negócio (Email):</label>
                <select id="business">
                    <option value="">Carregando...</option>
                </select>
                
                <label for="history" style="margin-top: 15px;">Histórico da Conversa:</label>
                <div id="historyDisplay"></div>
            </div>

            <div class="control-group">
                <label for="userMessage">Mensagem do Usuário:</label>
                <textarea id="userMessage" placeholder="Digite a pergunta do cliente...">Qual o preço?</textarea>

                <div class="button-group">
                    <button class="btn-primary" onclick="testAllModels()">🚀 Testar Todos os Modelos</button>
                    <button class="btn-secondary" onclick="clearHistory()">🗑️ Limpar Histórico</button>
                    <button class="btn-success" onclick="addToHistory()">➕ Adicionar ao Histórico</button>
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Testando modelos... Isso pode levar alguns segundos.</p>
        </div>

        <div class="error" id="error"></div>

        <div class="results" id="results">
            <h2 style="margin-bottom: 20px;">📊 Resultados Comparativos</h2>
            <div class="results-grid" id="resultsGrid"></div>
            <div class="summary" id="summary"></div>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let currentPrompt = '';

        // Modelos a testar
        const MODELS = [
            { id: 'openai/gpt-oss-20b', name: 'GPT-OSS 20B', api: 'openrouter', cost: '$0.12/M' },
            { id: 'google/gemma-3n-e4b-it', name: 'Gemma 3n E4B', api: 'openrouter', cost: '$0.06/M' },
            { id: 'open-mistral-7b', name: 'Mistral 7B', api: 'mistral', cost: '$0.25/M' },
            { id: 'mistral-small-latest', name: 'Mistral Small', api: 'mistral', cost: '$1/M' },
            { id: 'open-mixtral-8x7b', name: 'Mixtral 8x7B', api: 'mistral', cost: '$0.70/M' },
            { id: 'open-mixtral-8x22b', name: 'Mixtral 8x22B', api: 'mistral', cost: '$2/M' },
            { id: 'mistral-large-latest', name: 'Mistral Large', api: 'mistral', cost: '$4/M' },
        ];

        // Carregar negócios
        async function loadBusinesses() {
            try {
                const response = await fetch('/api/businesses');
                const businesses = await response.json();
                
                const select = document.getElementById('business');
                select.innerHTML = businesses.map(b => 
                    `<option value="${b.email}">${b.name} (${b.email})</option>`
                ).join('');
                
                // Carregar prompt do primeiro negócio
                if (businesses.length > 0) {
                    await loadPrompt(businesses[0].email);
                }
            } catch (error) {
                showError('Erro ao carregar negócios: ' + error.message);
            }
        }

        // Carregar prompt
        async function loadPrompt(email) {
            try {
                const response = await fetch(`/api/prompt/${email}`);
                const data = await response.json();
                currentPrompt = data.prompt;
            } catch (error) {
                showError('Erro ao carregar prompt: ' + error.message);
            }
        }

        // Listener para mudança de negócio
        document.getElementById('business').addEventListener('change', async (e) => {
            await loadPrompt(e.target.value);
            clearHistory();
        });

        // Adicionar ao histórico
        function addToHistory() {
            const userMessage = document.getElementById('userMessage').value.trim();
            if (!userMessage) return;

            conversationHistory.push({
                role: 'user',
                content: userMessage
            });

            // Limpar o campo
            document.getElementById('userMessage').value = '';
            
            updateHistoryDisplay();
        }

        // Limpar histórico
        function clearHistory() {
            conversationHistory = [];
            updateHistoryDisplay();
        }

        // Atualizar display do histórico
        function updateHistoryDisplay() {
            const display = document.getElementById('historyDisplay');
            
            if (conversationHistory.length === 0) {
                display.innerHTML = '<p style="color: #999; font-size: 0.9em;">Nenhum histórico</p>';
                return;
            }

            display.innerHTML = conversationHistory.map(msg => `
                <div class="history-item">
                    <span class="history-${msg.role}">${msg.role === 'user' ? '👤 Usuário' : '🤖 Assistente'}:</span>
                    ${msg.content}
                </div>
            `).join('');
        }

        // Testar todos os modelos
        async function testAllModels() {
            const userMessage = document.getElementById('userMessage').value.trim();
            if (!userMessage) {
                showError('Digite uma mensagem primeiro!');
                return;
            }

            const business = document.getElementById('business').value;
            if (!business) {
                showError('Selecione um negócio!');
                return;
            }

            // Mostrar loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            try {
                const response = await fetch('/api/test-models', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        business,
                        userMessage,
                        history: conversationHistory
                    })
                });

                const results = await response.json();
                displayResults(results);

                // Adicionar ao histórico
                conversationHistory.push({
                    role: 'user',
                    content: userMessage
                });

                // Adicionar melhor resposta ao histórico
                const bestResult = results.reduce((best, current) => 
                    current.score > best.score ? current : best
                );
                
                conversationHistory.push({
                    role: 'assistant',
                    content: bestResult.response
                });

                updateHistoryDisplay();

            } catch (error) {
                showError('Erro ao testar modelos: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Exibir resultados
        function displayResults(results) {
            const grid = document.getElementById('resultsGrid');
            const summary = document.getElementById('summary');

            // Encontrar vencedor
            const winner = results.reduce((best, current) => 
                current.score > best.score ? current : best
            );

            // Renderizar cards
            grid.innerHTML = results.map(result => {
                const isWinner = result.modelId === winner.modelId;
                const scoreClass = result.score >= 80 ? 'good' : result.score >= 60 ? 'warning' : 'bad';
                
                return `
                    <div class="result-card ${isWinner ? 'winner' : ''}">
                        ${isWinner ? '<div class="winner-badge">🏆 VENCEDOR</div>' : ''}
                        
                        <div class="result-header">
                            <div class="model-name">${result.modelName}</div>
                            <div class="badge badge-info">${result.cost}</div>
                        </div>

                        <div class="metrics">
                            <div class="metric">
                                <div class="metric-label">Score</div>
                                <div class="metric-value ${scoreClass}">${result.score}%</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Tempo</div>
                                <div class="metric-value">${result.elapsed}ms</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Alucinações</div>
                                <div class="metric-value ${result.hallucinations > 0 ? 'bad' : 'good'}">${result.hallucinations}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">Tokens</div>
                                <div class="metric-value">${result.tokens || 'N/A'}</div>
                            </div>
                        </div>

                        <div class="response-text">
                            ${result.response}
                        </div>
                    </div>
                `;
            }).join('');

            // Resumo
            const avgScore = (results.reduce((sum, r) => sum + r.score, 0) / results.length).toFixed(1);
            const totalHallucinations = results.reduce((sum, r) => sum + r.hallucinations, 0);

            summary.innerHTML = `
                <h3>📈 Resumo Geral</h3>
                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="metric-label">🏆 Vencedor</div>
                        <div class="metric-value good">${winner.modelName}</div>
                    </div>
                    <div class="summary-item">
                        <div class="metric-label">📊 Média de Score</div>
                        <div class="metric-value">${avgScore}%</div>
                    </div>
                    <div class="summary-item">
                        <div class="metric-label">🚫 Total Alucinações</div>
                        <div class="metric-value ${totalHallucinations > 0 ? 'bad' : 'good'}">${totalHallucinations}</div>
                    </div>
                </div>
            `;

            document.getElementById('results').style.display = 'block';
        }

        // Mostrar erro
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Inicializar
        loadBusinesses();
        updateHistoryDisplay();
    </script>
</body>
</html>
