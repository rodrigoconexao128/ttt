    <script type="module">
      const MAX_BOOT_RETRIES = 3;
      const BOOT_RETRY_DELAY_MS = 500;

      const bootApp = async (attempt = 0) => {
        try {
          await import('/src/main.tsx');
        } catch (error) {
          console.error('[BOOT] Falha ao carregar app', error);
          if (attempt < MAX_BOOT_RETRIES) {
            setTimeout(() => bootApp(attempt + 1), BOOT_RETRY_DELAY_MS);
            return;
          }
          const root = document.getElementById('root');
          if (root) {
            root.innerHTML = `
              <div style="display:flex;min-height:100vh;align-items:center;justify-content:center;background:#0f172a;color:#fff;font-family:system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;">
                <div style="max-width:520px;text-align:center;padding:24px;">
                  <h1 style="font-size:24px;margin:0 0 12px;">Não foi possível carregar a aplicação</h1>
                  <p style="opacity:0.85;margin:0 0 20px;">Clique para tentar novamente.</p>
                  <button id="boot-retry" style="background:#22c55e;color:#0f172a;border:none;border-radius:10px;padding:12px 20px;font-weight:700;cursor:pointer;">Recarregar</button>
                </div>
              </div>
            `;
            const retryButton = document.getElementById('boot-retry');
            retryButton?.addEventListener('click', () => window.location.reload());
          }
        }
      };

      bootApp();
    </script>
